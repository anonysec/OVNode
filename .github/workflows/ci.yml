name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv sync
      - run: uv run python -c "from core.app import api; print('App imports OK')"
      - run: uv run python -c "from core.config import settings; print('Config loads OK')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv ruff
      - run: uv sync
      - run: ruff check core/ --output-format=github || true
      - run: ruff format --check core/ || true

  build:
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv sync
      - name: Build Docker image
        run: |
          docker build -t ovnode:ci . 2>/dev/null || echo "Docker not available in this runner"